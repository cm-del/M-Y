<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>A&Y - مزرعة الدواجن الذكية</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐔</text></svg>">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/print.css" media="print">
    <meta property="og:title" content="A&Y - مزرعة دواجن ذكية">
    <meta property="og:description" content="إدارة متكاملة بالذكاء الاصطناعي">
    <meta property="og:image" content="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='80'>🐔</text></svg>">
    <meta name="theme-color" content="#0b1a2e">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
    <div id="splashScreen" style="position:fixed;inset:0;background:#060d17;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity 0.6s ease;">
        <div style="font-size:4rem;margin-bottom:1rem;">🐔</div>
        <h2 style="color:#d4af37;font-family:'Tajawal',sans-serif;">A&Y للمزارع الذكية</h2>
        <p style="color:#76c7c0;margin-top:0.5rem;">ذكاء يضاعف إنتاجك...</p>
    </div>

    <header class="hdr">
        <div style="display:flex;align-items:center;gap:10px">
            <div class="logo-box">🐔</div>
            <div><div class="app-name">A&Y للمزارع</div><div class="app-sub" id="hdrDate"></div></div>
        </div>
        <div class="hdr-r">
            <button id="installBtn" class="chip" style="display:none;background:var(--gold);color:#000;font-weight:600;">📲 تثبيت</button>
            <div class="chip" onclick="Modals.showWeather()">🌡 <span id="hdrTemp">--°</span></div>
            <div class="chip" onclick="Modals.showExport()">📤</div>
            <div class="chip" onclick="UI.toggleLock()">🔒</div>
        </div>
    </header>
    <div class="fbar" id="farmBar"></div>
    <div class="hb" id="hangarBar"></div>

    <div id="page-dash" class="page active"></div>
    <div id="page-hangars" class="page"></div>
    <div id="page-store" class="page"></div>
    <div id="page-data" class="page">
        <div class="itabs" id="dataTabs">
            <button class="it active" onclick="UI.switchDTab('w',this)">⚖️ أوزان</button>
            <button class="it" onclick="UI.switchDTab('f',this)">🌾 علف</button>
            <button class="it" onclick="UI.switchDTab('d',this)">💀 نفوق</button>
            <button class="it" onclick="UI.switchDTab('s',this)">💰 مبيعات</button>
            <button class="it" onclick="UI.switchDTab('e',this)">📋 مصاريف</button>
            <button class="it" onclick="UI.switchDTab('st',this)">👥 عمالة</button>
            <button class="it" onclick="UI.switchDTab('cmp',this)">🔄 مقارنة</button>
        </div>
        <div id="dataContent"></div>
    </div>
    <div id="page-temp" class="page">
        <div class="itabs"><button class="it active" onclick="UI.switchTTab('log',this)">🌡 حرارة</button><button class="it" onclick="UI.switchTTab('vent',this)">💨 تهوية</button></div>
        <div id="tempContent"></div>
    </div>
    <div id="page-ref" class="page">
        <div class="itabs"><button class="it active" onclick="UI.switchRefTab('disease',this)">🦠 أمراض</button><button class="it" onclick="UI.switchRefTab('analytics',this)">📊 تحليلات</button></div>
        <div id="refContent"></div>
    </div>
    <div id="page-more" class="page">
        <div class="itabs">
            <button class="it active" onclick="UI.switchMoreTab('photos',this)">📷 صور</button>
            <button class="it" onclick="UI.switchMoreTab('agenda',this)">📅 أجندة</button>
            <button class="it" onclick="UI.switchMoreTab('clients',this)">👥 عملاء</button>
            <button class="it" onclick="UI.switchMoreTab('market',this)">📈 أسعار</button>
            <button class="it" onclick="UI.switchMoreTab('backup',this)">💾 نسخ</button>
        </div>
        <div id="moreContent"></div>
    </div>

    <nav class="bnav">
        <button class="ni active" onclick="App.showPage('dash',this)">📊 الرئيسية</button>
        <button class="ni" onclick="App.showPage('hangars',this)">🏚 العنابر</button>
        <button class="ni" onclick="App.showPage('store',this)">🌾 المخزن</button>
        <button class="ni" onclick="App.showPage('data',this)">📋 البيانات</button>
        <button class="ni" onclick="App.showPage('temp',this)">🌡 الحرارة</button>
        <button class="ni" onclick="App.showPage('ref',this)">📚 المرجع</button>
        <button class="ni" onclick="App.showPage('more',this)">➕ المزيد</button>
    </nav>

    <noscript><div style="background:#d32f2f;color:white;text-align:center;padding:10px;">⚠️ الرجاء تفعيل JavaScript</div></noscript>

    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/db.js"></script>
    <script src="js/weather.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/export.js"></script>
    <script src="js/modals.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
    <script src="js/sw-register.js"></script>
    <script src="js/notifications.js"></script>
    <script>
        setTimeout(() => {
            const s = document.getElementById('splashScreen');
            if(s) { s.style.opacity='0'; setTimeout(() => s.remove(), 600); }
        }, 1500);
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('installBtn').style.display='flex';
        });
    </script>
</body>
  </html>
